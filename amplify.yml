version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        - sudo dnf install -y docker 
        - sudo dockerd &
        - wait-on -t 15000 file:/var/run/docker.sock
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npm test
        - ls -la reports
        - sudo docker run --add-host=hostmachine:host-gateway --network=host --rm --init -v $(pwd):/home/pwuser -e TEST_USER_EMAIL="$TEST_USER_EMAIL" -e TEST_USER_PASSWORD="$TEST_USER_PASSWORD" mcr.microsoft.com/playwright:v1.49.1-jammy /bin/sh -c "cd /home/pwuser && npm install @playwright/test@1.49.1 && npx playwright install && npx playwright test"
        - ls -la reports
        - npm run test:selenium
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: 'reports'
    files:
      - '**/*'