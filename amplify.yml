version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - npm i
        - npm install -g wait-on
        - npm install pm2
        - npx pm2 start npm --name "botchat" -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npm i -D @playwright/test
        - npx playwright install
        - npx playwright test
        - echo "Finished tests"
    postTest:
      commands:
        - npx pm2 --help
        - npx pm2 kill
  artifacts:
    baseDirectory: '**/*'
    files:
      - '**/*'
