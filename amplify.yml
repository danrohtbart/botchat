version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - cat /etc/os-release
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        - npm i -D @playwright/test
        - npx playwright install
        - sudo dnf install -y libicu libatomic woff2 opus libjpeg-turbo libwebp enchant2 hyphen libgudev libffi libevdev x264-libs
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npx playwright test
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: 'playwright-report'
    files:
      - 'index.html'
