version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - cat /etc/os-release
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        - sudo dnf install -y epel-release
        - sudo dnf config-manager --set-enabled crb
        - sudo dnf install -y libicu-69.1 libatomic woff2 opus libjpeg-turbo libwebp enchant2 hyphen libgudev libffi libevdev x264 compat-libicu66 
        - npm i -D @playwright/test
        - npx playwright install
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npx playwright test
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: 'playwright-report'
    files:
      - 'index.html'
