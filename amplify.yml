version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - cat /etc/os-release
        # Install required dependencies
        - sudo dnf install -y compat-libicu libicu libatomic woff2 opus libjpeg-turbo libwebp enchant2 libgudev libffi libevdev hyphen-libs 
        - sudo dnf groupinstall -y "Development Tools"
        # Set up the test environment
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        - npm i -D @playwright/test
        - npx playwright install
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npx playwright test
        - cat playwright-report/index.txt
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: '/playwright-report'
    files:
      - '**/*'
