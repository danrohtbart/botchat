version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - npm ci
        - npm install -g wait-on
        - npm run dev
        - wait-on http://localhost:3000
    test:
      commands:
        - npm test
        - npm i -D @playwright/test
        - npx playwright install
        - npx playwright test
  artifacts:
    baseDirectory: reports
    files:
      - jest-junit.xml
    configFilePath: '**/jest-junit.xml'
