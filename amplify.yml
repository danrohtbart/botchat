version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - sudo dnf install -y alsa-lib at-spi2-atk at-spi2-core atk bash cairo cups-libs dbus-libs expat flac-libs gdk-pixbuf2 glib2 glibc gtk3 libX11 libXcomposite libXdamage libXext libXfixes libXrandr libXtst libcanberra-gtk3 libdrm libgcc libstdc++ libxcb libxkbcommon libxshmfence libxslt mesa-libgbm nspr nss nss-util pango policycoreutils policycoreutils-python-utils zlib
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        - npm i -D @playwright/test
        - npx playwright install chromium
        - npx playwright install firefox
        - npx playwright install webkit
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npx playwright test --project chromium --project firefox --project webkit
        - ls -la reports
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: 'reports'
    files:
      - '**/*'