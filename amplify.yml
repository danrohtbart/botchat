version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    test:
      commands:
        - npm test
        - npx playwright test
  artifacts:
    baseDirectory: reports
    files:
      - jest-junit.xml
    configFilePath: '**/jest-junit.xml'
