version: 1
# Gen 2 build spec — only on claude/gen2-deployment branch (Amplify app
# dr03gq88jj3a1 / botchat-gen2). The existing Gen 1 hosting app's dev/main
# branches use the original amplify.yml until cutover (PR 4 of the
# migration). See ClickUp 86b9qh888.
backend:
  phases:
    build:
      commands:
        # `npm ci`, never `npm install` — see aws-amplify/amplify-backend#3158
        # (npm install mutates the lockfile to a state where npm ci then errors).
        - npm ci --cache .npm --prefer-offline
        # Deploys the Gen 2 backend defined in amplify/backend.ts. The
        # AWS_BRANCH and AWS_APP_ID env vars are auto-injected by Amplify
        # Hosting. Generates amplify_outputs.json on success.
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Bridges amplify_outputs.json into src/aws-exports.js so the
        # frontend imports the Gen 2 config (page.js still imports from
        # ../aws-exports). aws-amplify@6 accepts the Gen 2 nested shape
        # natively, so no transformation is needed.
        - node scripts/generate-amplify-config.js
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
test:
  phases:
    preTest:
      commands:
        - mkdir -p $HOME/bin && curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b $HOME/bin
        - $HOME/bin/trufflehog git file://. --only-verified --fail
        - npm ci --cache .npm --prefer-offline
    test:
      commands:
        - npm run check:no-skip
        - npm test
  artifacts:
    baseDirectory: 'reports'
    files:
      - '**/*'
