version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - sudo dnf install -y docker
        - sudo dockerd &
        - sudo docker info
        - timeout 60
        - sudo docker info
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        #- npm i -D @playwright/test
        #- npx playwright install chromium
        #- npx playwright install firefox
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        #- npx playwright test --project chromium --project firefox 
        - ls -la reports
        - docker run --add-host=hostmachine:host-gateway --rm --init -it -v $(pwd):/home/pwuser mcr.microsoft.com/playwright:v1.49.1-jammy /bin/sh -c "cd /home/pwuser && npm install @playwright/test@1.49.1 && npx playwright install && npx playwright test" 
        - ls -la reports
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: 'reports'
    files:
      - '**/*'