version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases: 
    preTest:
      commands:
        - echo fs.inotify.max_user_watches=65536 | tee -a /etc/sysctl.conf && sysctl -p
        - npm ci
        - npm install -g wait-on
        - npm install pm2
        - npx pm2 start npm --name "botchat" -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npm test
        - npm i -D @playwright/test
        - npx playwright install
        - npx playwright test
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: reports
    files:
      - jest-junit.xml
    configFilePath: '**/jest-junit.xml'
