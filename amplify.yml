version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
    test:
      commands:
        - npm test
        - pwd
        - ls -la
        - ls -la reports || echo "Reports directory not found"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  artifacts:
    baseDirectory: reports
    files:
      - jest-junit.xml
    configFilePath: '**/jest-junit.xml'
