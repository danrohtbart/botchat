version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - node scripts/sync-lambda-graphql.js
        - |
          git diff --exit-code amplify/backend/function/botchattriggerjs/src/graphql.js || (echo "ERROR: graphql.js is out of sync with src/graphql/. Run 'npm run sync-lambda-graphql' and commit the result." && exit 1)
        - |
          if [ -n "$AWS_PULL_REQUEST_ID" ]; then
            node -e "const fs=require('fs');const c={aws_project_region:process.env.PREVIEW_AWS_PROJECT_REGION,aws_appsync_graphqlEndpoint:process.env.PREVIEW_APPSYNC_ENDPOINT,aws_appsync_region:process.env.PREVIEW_AWS_PROJECT_REGION,aws_appsync_authenticationType:'AMAZON_COGNITO_USER_POOLS',aws_cognito_identity_pool_id:process.env.PREVIEW_COGNITO_IDENTITY_POOL_ID,aws_cognito_region:process.env.PREVIEW_AWS_PROJECT_REGION,aws_user_pools_id:process.env.PREVIEW_USER_POOLS_ID,aws_user_pools_web_client_id:process.env.PREVIEW_USER_POOLS_WEB_CLIENT_ID,oauth:{},aws_cognito_username_attributes:['EMAIL'],aws_cognito_social_providers:[],aws_cognito_signup_attributes:['EMAIL'],aws_cognito_mfa_configuration:'OFF',aws_cognito_mfa_types:['SMS'],aws_cognito_password_protection_settings:{passwordPolicyMinLength:8,passwordPolicyCharacters:[]},aws_cognito_verification_mechanisms:['EMAIL']};fs.writeFileSync('src/aws-exports.js','const awsmobile = '+JSON.stringify(c,null,2)+';\nexport default awsmobile;\n');console.log('Generated src/aws-exports.js for PR preview');"
          fi
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
test:
  phases:
    preTest:
      commands:
        - mkdir -p $HOME/bin && curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b $HOME/bin
        - $HOME/bin/trufflehog git file://. --only-verified --fail
        - npm ci
        - npm install -g wait-on
        - npm install -g pm2
        - sudo dnf install -y docker
        - sudo dockerd &
        - wait-on -t 15000 file:/var/run/docker.sock
        - npx pm2 start npm -- start
        - wait-on http://localhost:3000
    test:
      commands:
        - npm run check:no-skip
        - npm test
        - ls -la reports
        - sudo docker run --add-host=hostmachine:host-gateway --network=host --rm --init -v $(pwd):/home/pwuser -e TEST_USER_EMAIL="$TEST_USER_EMAIL" -e TEST_USER_PASSWORD="$TEST_USER_PASSWORD" -e CI=true mcr.microsoft.com/playwright:v1.59.1-jammy /bin/sh -c "cd /home/pwuser && npm install @playwright/test@1.59.1 && npx playwright install && npx playwright test"
        - ls -la reports
    postTest:
      commands:
        - npx pm2 kill
  artifacts:
    baseDirectory: 'reports'
    files:
      - '**/*'
