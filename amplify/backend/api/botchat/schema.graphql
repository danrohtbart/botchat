type Chat @model @auth(rules: [{allow: public}, {allow: owner}]) {
  id: ID!
  message: String!
  message_in_thread: Int
  user_email: String
  speaker_name: String
}

type Bot @model @auth(rules: [{allow: public}, {allow: owner}]) {
  id: ID!
  bot_name: String
  bot_personality: String
  bot_url: AWSURL
}
 