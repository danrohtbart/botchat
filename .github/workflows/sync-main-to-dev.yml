name: Sync main → dev

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin main dev
          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "branch=sync/main-to-dev-$(git rev-parse --short origin/main)" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.needed == 'true'
        run: |
          git checkout -b "${{ steps.check.outputs.branch }}" origin/dev
          git merge origin/main --no-edit
          git push origin "${{ steps.check.outputs.branch }}"

      - name: Open PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base dev \
            --head "${{ steps.check.outputs.branch }}" \
            --title "Sync main → dev" \
            --body "Automated sync after main was updated. No conflicts — safe to merge."
